{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>GIFTED MINDS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
            font-family: 'Segoe UI', sans-serif;
        }

        .navbar {
            background-color: #0d1b2a;
        }

        .navbar-brand img {
            height: 45px;
        }

        footer {
            background: #0d1b2a;
            color: white;
            padding: 40px 0;
            margin-top: 60px;
        }

        footer p {
            margin: 0;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="{% url 'home' %}">
            <img src="{% static 'images/logo.jpeg' %}" alt="Logo">
            <span class="ms-2 fw-bold">Gifted Minds Learning Platform</span>
        </a>

        <div class="ms-auto">
            <a href="{% url 'login' %}" class="btn btn-outline-light me-2">Login</a>
            <a href="{% url 'student_signup' %}" class="btn btn-warning">Register</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

<!-- FOOTER -->
<footer class="text-center">
    <div class="container">
        <h5>Gifted Minds Learning Platform</h5>
        <p>MOTTO: My Future, My Responsibility.</p>
        <p>&copy; 2026 All Rights Reserved</p>
    </div>
</footer>

</body>
</html>
