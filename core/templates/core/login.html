<!DOCTYPE html>
<html>
<head>
    <title>GIFTED MINDS - Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4e73df, #1cc88a);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            width: 350px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        h1 {
            text-align: center;
            color: #4e73df;
            margin-bottom: 30px;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #4e73df;
            border: none;
            color: white;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background: #2e59d9;
        }
        .errorlist {
            color: red;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>GIFTED MINDS</h1>

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Login</button>
        </form>

        <br>
        <p style="text-align:center;">
            Don’t have an account?
            <br>
            <a href="/signup/student/">Student Signup</a> |
            <a href="/signup/admin/">Admin Signup</a>
        </p>
    </div>
</body>
</html>
