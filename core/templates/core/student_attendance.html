<h2>My Attendance History</h2>

<table border="1" cellpadding="10">
    <tr>
        <th>Course</th>
        <th>Date</th>
        <th>Status</th>
    </tr>

    {% for record in attendance_records %}
    <tr>
        <td>{{ record.session.course.title }}</td>
        <td>{{ record.session.date }}</td>
        <td>
            {% if record.present %}
                ✅ Present
            {% else %}
                ❌ Absent
            {% endif %}
        </td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="3">No attendance records found.</td>
    </tr>
    {% endfor %}
</table>
